    <link rel="stylesheet" href="style.css">

    <style>/* ===========================================
COMING SOON
=========================================== */

.coming-soon{

    display:flex;
    align-items:center;
    justify-content:center;

    min-height:75vh;

    padding:30px 0 120px;

}


.coming-card{

    max-width:760px;

    margin:auto;

    text-align:center;

}


.coming-card h1{

    margin:24px 0;

    font-size:clamp(56px,8vw,96px);

    line-height:.95;

    letter-spacing:-.06em;

}


.coming-card h1 span{

    color:var(--text-highlight);

}


.coming-text{

    max-width:620px;

    margin:40px auto;

    font-size:22px;

    line-height:1.7;

    color:var(--text-secondary);

}


.coming-card .button{

    margin-top:24px;

}</style>
</head>

<body>

<header class="site-header">

    <div class="container header-inner">

        <a href="index.html" class="logo">

            <div class="logo-avatar">
                <img src="assets/images/avatar.png" alt="Logo">
            </div>

            <span class="logo-text">
                EP
            </span>

        </a>

        <nav class="navigation">
            <a href="index.html#work">Cases</a>
            <a href="index.html#about">About</a>
            <a href="index.html#contact">Contact</a>
        </nav>

    </div>

</header>

<main>

<section class="coming-soon">

    <div class="container">

        <div class="coming-card">

            <p class="eyebrow">
                Case Study
            </p>

            <h1>
                This case study is
                <span>coming soon.</span>
            </h1>

            <p class="coming-text">
                I'm currently refining this project to better showcase
                the product strategy, design decisions, process, and measurable

            </a>

        </div>

    </div>

</section>
